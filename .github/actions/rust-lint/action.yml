name: Rust Lint
description: Run cargo fmt and clippy
runs:
  using: composite
  steps:
    - name: Rust format
      shell: bash
      run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check
    - name: Clippy
      shell: bash
      run: cargo clippy --manifest-path rust/Cargo.toml --workspace -- -D warnings
