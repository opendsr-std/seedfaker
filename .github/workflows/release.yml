name: Release

# Manual trigger only. Push a tag first, then dispatch this workflow.
# All publish jobs require the "release" environment with manual approval.

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_PROVENANCE: "--provenance"

jobs:
  # ---------------------------------------------------------------------------
  # Validate: tag exists, all versions match
  # ---------------------------------------------------------------------------

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag from HEAD
        id: tag
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "::error::HEAD is not tagged. Push a tag first: git tag -a v0.1.0 -m 'Release v0.1.0' && git push origin v0.1.0"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (tag: $TAG)"

      - name: Verify tag matches package versions
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          CORE=$(grep '^version' rust/core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          CLI=$(grep '^version' rust/cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NAPI=$(grep '^version' rust/napi/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PYO3=$(grep '^version' rust/pyo3/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          FFI=$(grep '^version' rust/ffi/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          WASM_RS=$(grep '^version' rust/wasm/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NPM=$(node -p "require('./packages/npm/package.json').version")
          WASM_NPM=$(node -p "require('./packages/wasm/package.json').version")
          NPM_CLI=$(node -p "require('./packages/npm-cli/package.json').version")
          PIP=$(grep '^version' packages/pip/pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          PHP=$(node -p "require('./packages/php/composer.json').version")

          RUBY=$(sed -n 's/.*s\.version\s*=\s*"\(.*\)".*/\1/p' packages/ruby/seedfaker.gemspec)
          echo "tag=$TAG core=$CORE cli=$CLI napi=$NAPI pyo3=$PYO3 ffi=$FFI wasm=$WASM_RS npm=$NPM wasm_npm=$WASM_NPM pip=$PIP php=$PHP ruby=$RUBY"

          for v in "$CORE" "$CLI" "$NAPI" "$PYO3" "$FFI" "$WASM_RS" "$NPM" "$NPM_CLI" "$WASM_NPM" "$PHP"; do
            if [ "$v" != "$TAG" ]; then
              echo "::error::Tag v${TAG} does not match package version ${v}"
              exit 1
            fi
          done

          # pip PEP 440 normalization
          EXPECTED_PIP=$(echo "$TAG" | sed 's/-alpha\.\([0-9]*\)/a\1/' | sed 's/-beta\.\([0-9]*\)/b\1/' | sed 's/-rc\.\([0-9]*\)/rc\1/')
          if [ "$PIP" != "$EXPECTED_PIP" ] && [ "$PIP" != "$TAG" ]; then
            echo "::error::pip version ($PIP) does not match expected ($EXPECTED_PIP)"
            exit 1
          fi

          PY_INIT=$(grep '__version__' packages/pip/seedfaker/__init__.py | sed 's/.*"\(.*\)"/\1/')
          if [ -n "$PY_INIT" ] && [ "$PY_INIT" != "$EXPECTED_PIP" ] && [ "$PY_INIT" != "$PIP" ]; then
            echo "::error::Python __version__ ($PY_INIT) != expected ($EXPECTED_PIP)"
            exit 1
          fi

          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            PLAT_VER=$(node -p "require('./packages/npm/platforms/${platform}/package.json').version")
            if [ "$PLAT_VER" != "$TAG" ]; then
              echo "::error::npm platform ${platform} version ($PLAT_VER) != tag ($TAG)"
              exit 1
            fi
          done

          # Ruby gemspec: 0.1.0-alpha.N → 0.1.0.pre.alpha.N
          EXPECTED_RUBY=$(echo "$TAG" | sed 's/-/.pre./')
          if [ "$RUBY" != "$EXPECTED_RUBY" ]; then
            echo "::error::Ruby gemspec version ($RUBY) != expected ($EXPECTED_RUBY)"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build: CLI + NAPI + PyO3 + FFI — 3 runners (Linux, macOS, Windows)
  # ---------------------------------------------------------------------------

  build-linux:
    name: Build (Linux)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-release-linux-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-release-linux-

      - name: Install cross-compiler (ARM64)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build x86_64
        run: cargo build --release --manifest-path rust/Cargo.toml --workspace --target x86_64-unknown-linux-gnu

      - name: Build aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PYO3_CROSS: "1"
        run: cargo build --release --manifest-path rust/Cargo.toml --workspace --target aarch64-unknown-linux-gnu

      - name: Test (x86_64)
        run: cargo test --manifest-path rust/Cargo.toml --workspace --target x86_64-unknown-linux-gnu

      - name: Stage artifacts
        run: |
          for pair in "x86_64-unknown-linux-gnu:linux-x64" "aarch64-unknown-linux-gnu:linux-arm64"; do
            target="${pair%%:*}"; platform="${pair##*:}"
            base="rust/target/${target}/release"
            out="staging/${platform}"
            mkdir -p "${out}/bin" "${out}/npm"

            cp "${base}/seedfaker" "${out}/bin/"
            strip "${out}/bin/seedfaker" || true
            cp "${base}/libseedfaker_ffi.so" "${out}/"
            strip "${out}/libseedfaker_ffi.so" || true
            cp "${base}/libseedfaker_napi.so" "${out}/npm/seedfaker_napi.node"
            cp "${base}/lib_seedfaker.so" "${out}/pyo3.so"

            (cd "${out}/bin" && sha256sum seedfaker > seedfaker.sha256)
          done

      - uses: taiki-e/install-action@cargo-zigbuild

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Add musl targets
        run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Build CLI x86_64-musl
        run: cargo zigbuild --release --manifest-path rust/Cargo.toml --package seedfaker --target x86_64-unknown-linux-musl

      - name: Build CLI aarch64-musl
        run: cargo zigbuild --release --manifest-path rust/Cargo.toml --package seedfaker --target aarch64-unknown-linux-musl

      - name: Stage musl CLI artifacts
        run: |
          for pair in "x86_64-unknown-linux-musl:linux-x64-musl" "aarch64-unknown-linux-musl:linux-arm64-musl"; do
            target="${pair%%:*}"; platform="${pair##*:}"
            base="rust/target/${target}/release"
            out="staging/${platform}/bin"
            mkdir -p "${out}"
            cp "${base}/seedfaker" "${out}/"
            strip "${out}/seedfaker" || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: staging/

  build-macos:
    name: Build (macOS)
    needs: validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-release-macos-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-release-macos-

      - name: Build both targets
        env:
          RUSTFLAGS: -C link-arg=-undefined -C link-arg=dynamic_lookup
        run: |
          cargo build --release --manifest-path rust/Cargo.toml --workspace --target aarch64-apple-darwin
          cargo build --release --manifest-path rust/Cargo.toml --workspace --target x86_64-apple-darwin

      - name: Test (arm64, native)
        run: cargo test --manifest-path rust/Cargo.toml --workspace --target aarch64-apple-darwin

      - name: Stage artifacts
        run: |
          for pair in "aarch64-apple-darwin:darwin-arm64" "x86_64-apple-darwin:darwin-x64"; do
            target="${pair%%:*}"; platform="${pair##*:}"
            base="rust/target/${target}/release"
            out="staging/${platform}"
            mkdir -p "${out}/bin" "${out}/npm"

            cp "${base}/seedfaker" "${out}/bin/"
            strip "${out}/bin/seedfaker" || true
            cp "${base}/libseedfaker_ffi.dylib" "${out}/"
            strip "${out}/libseedfaker_ffi.dylib" || true
            cp "${base}/libseedfaker_napi.dylib" "${out}/npm/seedfaker_napi.node"
            cp "${base}/lib_seedfaker.dylib" "${out}/pyo3.dylib"

            (cd "${out}/bin" && shasum -a 256 seedfaker > seedfaker.sha256)
          done

      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: staging/

  build-windows:
    name: Build (Windows)
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-release-windows-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-release-windows-

      - name: Build
        run: cargo build --release --manifest-path rust/Cargo.toml --workspace --target x86_64-pc-windows-msvc

      - name: Test
        run: cargo test --manifest-path rust/Cargo.toml --workspace --target x86_64-pc-windows-msvc

      - name: Stage artifacts
        shell: bash
        run: |
          base="rust/target/x86_64-pc-windows-msvc/release"
          out="staging/win32-x64"
          mkdir -p "${out}/bin" "${out}/npm"
          cp "${base}/seedfaker.exe" "${out}/bin/"
          cp "${base}/seedfaker_ffi.dll" "${out}/"
          cp "${base}/seedfaker_napi.dll" "${out}/npm/seedfaker_napi.node"
          cp "${base}/_seedfaker.dll" "${out}/pyo3.dll"
          (cd "${out}/bin" && sha256sum seedfaker.exe > seedfaker.exe.sha256)

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: staging/

  # ---------------------------------------------------------------------------
  # Publish: GitHub Release (CLI + FFI tarballs)
  # ---------------------------------------------------------------------------

  publish-github:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: staging
      - name: Create tarballs with checksums
        run: |
          mkdir -p dist
          for platform in linux-x64 linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            dir="staging/${platform}"
            [ -d "$dir/bin" ] || continue
            tar -czf "dist/seedfaker-${platform}.tar.gz" -C "$dir/bin" .
            (cd dist && sha256sum "seedfaker-${platform}.tar.gz" >> checksums-sha256.txt)
            if [ -f "$dir/libseedfaker_ffi.so" ] || [ -f "$dir/libseedfaker_ffi.dylib" ] || [ -f "$dir/seedfaker_ffi.dll" ]; then
              tar -czf "dist/seedfaker-ffi-${platform}.tar.gz" -C "$dir" $(ls "$dir" | grep -E 'ffi\.(so|dylib|dll)$')
              (cd dist && sha256sum "seedfaker-ffi-${platform}.tar.gz" >> checksums-sha256.txt)
            fi
          done

      - uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          for f in dist/*.tar.gz; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt"
          done

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.sig
            dist/*.crt
            dist/checksums-sha256.txt
          generate_release_notes: true
          prerelease: ${{ contains(needs.validate.outputs.tag, 'alpha') || contains(needs.validate.outputs.tag, 'beta') || contains(needs.validate.outputs.tag, 'rc') }}

  # ---------------------------------------------------------------------------
  # Publish: crates.io (core -> cli)
  # ---------------------------------------------------------------------------

  publish-cargo:
    name: Publish crates.io
    needs: [build-linux, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-publish-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-publish-
      - run: cargo publish --manifest-path rust/core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index
        run: |
          for i in $(seq 1 12); do
            sleep 10
            if cargo search seedfaker-core 2>/dev/null | grep -q "${{ needs.validate.outputs.tag }}"; then
              echo "Index updated"; break
            fi
            echo "Waiting... ($i)"
          done
      - run: cargo publish --manifest-path rust/cli/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Verify published crates match source
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          for crate in seedfaker-core seedfaker; do
            echo "Verifying $crate@$VERSION..."
            cargo download "$crate==$VERSION" --output "/tmp/$crate.crate" 2>/dev/null || {
              echo "::warning::cargo download not available, skipping verification"
              break
            }
            tar xzf "/tmp/$crate.crate" -C /tmp/
            LOCAL=$(cd rust && cargo package --manifest-path "${crate##seedfaker-}/Cargo.toml" --list 2>/dev/null | sort | sha256sum | cut -d' ' -f1) || true
            REMOTE=$(cd "/tmp/${crate}-${VERSION}" && find . -type f | sort | sha256sum | cut -d' ' -f1) || true
            if [ -n "$LOCAL" ] && [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
              echo "::error::$crate content mismatch: local=$LOCAL remote=$REMOTE"
              exit 1
            fi
            echo "  ok: $crate verified"
          done

  # ---------------------------------------------------------------------------
  # Publish: npm (platform packages + main + CLI + WASM)
  # ---------------------------------------------------------------------------

  publish-npm:
    name: Publish npm
    needs: [build-linux, build-macos, build-windows, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@1.88
      - run: rustup target add wasm32-unknown-unknown
      - uses: taiki-e/install-action@wasm-pack
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-wasm-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-wasm-
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: staging

      - name: Determine npm tag
        id: tag
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          echo "tag=latest" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Stage platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            dir="packages/npm/platforms/${platform}"
            mkdir -p "${dir}/bin"
            src="staging/${platform}"
            [ -d "$src" ] || continue
            cp "$src/bin/seedfaker"* "${dir}/bin/" 2>/dev/null || true
            cp "$src/npm/seedfaker_napi.node" "${dir}/" 2>/dev/null || true
            chmod +x "${dir}/bin/"* 2>/dev/null || true
          done

      - name: Stage musl CLI binaries into platform packages
        run: |
          for pair in "linux-x64-musl:linux-x64" "linux-arm64-musl:linux-arm64"; do
            musl="${pair%%:*}"; gnu="${pair##*:}"
            src="staging/${musl}"
            dir="packages/npm/platforms/${gnu}"
            [ -d "$src" ] || continue
            cp "$src/bin/seedfaker" "${dir}/bin/seedfaker-musl"
            chmod +x "${dir}/bin/seedfaker-musl"
          done

      - name: Inject checksums into wrapper code
        run: bash tools/inject-checksums.sh staging

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            dir="packages/npm/platforms/${platform}"
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              cd "$dir"
              pnpm publish --access public ${{ env.NPM_PROVENANCE }} --tag ${{ steps.tag.outputs.tag }} --no-git-checks
              cd -
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/npm && pnpm publish --access public ${{ env.NPM_PROVENANCE }} --tag ${{ steps.tag.outputs.tag }} --no-git-checks

      - name: Publish CLI package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/npm-cli && pnpm publish --access public ${{ env.NPM_PROVENANCE }} --tag ${{ steps.tag.outputs.tag }} --no-git-checks

      - name: Build and publish WASM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          wasm-pack build rust/wasm --target bundler --out-dir ../../packages/wasm/bundler --out-name seedfaker_wasm
          wasm-pack build rust/wasm --target web --out-dir ../../packages/wasm/web --out-name seedfaker_wasm
          # wasm-pack writes .gitignore * to output dirs; override so npm publish includes them
          printf '' > packages/wasm/bundler/.npmignore
          printf '' > packages/wasm/web/.npmignore
          cd packages/wasm && pnpm publish --access public ${{ env.NPM_PROVENANCE }} --tag ${{ steps.tag.outputs.tag }} --no-git-checks

      - name: Update next dist-tag for pre-releases
        if: steps.tag.outputs.prerelease == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          for pkg in \
            "@opendsr/seedfaker" \
            "@opendsr/seedfaker-cli" \
            "@opendsr/seedfaker-wasm" \
            "@opendsr/seedfaker-darwin-arm64" \
            "@opendsr/seedfaker-darwin-x64" \
            "@opendsr/seedfaker-linux-x64" \
            "@opendsr/seedfaker-linux-arm64" \
            "@opendsr/seedfaker-win32-x64"; do
            npm dist-tag add "${pkg}@${VERSION}" next
          done

  # ---------------------------------------------------------------------------
  # Publish: PyPI (maturin wheels — Linux + macOS in one upload)
  # ---------------------------------------------------------------------------

  publish-pypi-linux:
    name: Build PyPI wheels (Linux)
    needs: [build-linux, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-pypi-linux-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-pypi-linux-
      - name: Install cross-compiler (ARM64)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build wheels
        run: |
          mkdir -p dist
          cd packages/pip
          maturin build --release --target x86_64-unknown-linux-gnu --out "$GITHUB_WORKSPACE/dist"
          PYO3_CROSS=1 CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          maturin build --release --target aarch64-unknown-linux-gnu --out "$GITHUB_WORKSPACE/dist"
      - name: Verify wheels
        run: |
          ls dist/*.whl
          if ls dist/*-any.whl 2>/dev/null; then
            echo "::error::Found platform-generic wheel"; exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist/*.whl

  publish-pypi-macos:
    name: Build PyPI wheels (macOS)
    needs: [build-macos, validate]
    runs-on: macos-14
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-pypi-macos-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-pypi-macos-
      - name: Build wheels
        run: |
          mkdir -p dist
          cd packages/pip
          maturin build --release --target aarch64-apple-darwin --out "$GITHUB_WORKSPACE/dist"
          PYO3_CROSS=1 maturin build --release --target x86_64-apple-darwin --out "$GITHUB_WORKSPACE/dist"
      - name: Verify wheels
        run: |
          ls dist/*.whl
          if ls dist/*-any.whl 2>/dev/null; then
            echo "::error::Found platform-generic wheel"; exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist/*.whl

  publish-pypi-upload:
    name: Upload to PyPI
    needs: [publish-pypi-linux, publish-pypi-macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Verify wheels
        run: |
          echo "Uploading wheels:"
          ls -la dist/*.whl
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------------------------------------------------------------------------
  # Publish: Go module (opendsr-std/seedfaker-go)
  # ---------------------------------------------------------------------------

  publish-go:
    name: Publish Go module
    needs: [build-linux, build-macos, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: staging
      - name: Checkout seedfaker-go
        uses: actions/checkout@v5
        with:
          repository: opendsr-std/seedfaker-go
          token: ${{ secrets.GO_MODULE_TOKEN }}
          path: seedfaker-go
      - name: Update Go module
        run: |
          # Remove existing files to avoid dangling symlink / mode issues from previous tags
          rm -rf seedfaker-go/go.mod seedfaker-go/seedfaker.go seedfaker-go/opts_gen.go \
                 seedfaker-go/README.md seedfaker-go/LICENSE seedfaker-go/seedfaker.h \
                 seedfaker-go/bin

          install -m 644 packages/go/go.mod seedfaker-go/go.mod
          install -m 644 packages/go/seedfaker.go seedfaker-go/seedfaker.go
          install -m 644 packages/go/opts_gen.go seedfaker-go/opts_gen.go
          install -m 644 packages/go/README.md seedfaker-go/README.md
          install -m 644 LICENSE seedfaker-go/LICENSE
          install -m 644 include/seedfaker.h seedfaker-go/seedfaker.h

          for pair in "linux-x64:linux-x86_64:so" "linux-arm64:linux-arm64:so" "darwin-x64:darwin-x86_64:dylib" "darwin-arm64:darwin-arm64:dylib"; do
            IFS=: read -r platform target ext <<< "$pair"
            src="staging/${platform}"
            [ -d "$src" ] || continue
            mkdir -p "seedfaker-go/bin/${target}"
            install -m 644 "$src/libseedfaker_ffi.${ext}" "seedfaker-go/bin/${target}/libseedfaker_ffi.${ext}" || {
              echo "::error::missing libseedfaker_ffi.${ext} for ${platform}"; exit 1;
            }
          done

          if ! find seedfaker-go/bin -name 'libseedfaker_ffi.*' -type f | grep -q .; then
            echo "::error::no FFI binaries staged for Go module"
            exit 1
          fi
          echo "Staged Go module files:"
          find seedfaker-go -type f -not -path '*/.git/*' | sort
      - name: Commit, tag, push
        run: |
          cd seedfaker-go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git add -f bin/
          git diff --staged --quiet && { echo "No changes"; exit 0; }
          VERSION="${{ needs.validate.outputs.tag }}"
          git commit -m "v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  # ---------------------------------------------------------------------------
  # Publish: PHP (Packagist — tag triggers auto-update via webhook)
  # ---------------------------------------------------------------------------

  publish-php:
    name: Publish PHP (Packagist)
    needs: [build-linux, build-macos, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: staging
      - name: Checkout seedfaker-php
        uses: actions/checkout@v5
        with:
          repository: opendsr-std/seedfaker-php
          token: ${{ secrets.PHP_REPO_TOKEN }}
          path: seedfaker-php
      - name: Inject per-platform checksums into SeedFaker.php
        run: bash tools/inject-checksums.sh staging

      - name: Update PHP package
        run: |
          # Remove existing files to avoid dangling symlink / stale layout issues
          rm -rf seedfaker-php/composer.json seedfaker-php/README.md seedfaker-php/LICENSE \
                 seedfaker-php/src seedfaker-php/bin
          mkdir -p seedfaker-php/src seedfaker-php/bin

          install -m 644 packages/php/composer.json seedfaker-php/composer.json
          install -m 644 packages/php/src/SeedFaker.php seedfaker-php/src/SeedFaker.php
          install -m 644 packages/php/README.md seedfaker-php/README.md
          install -m 644 LICENSE seedfaker-php/LICENSE

          for pair in "linux-x64:linux-x86_64:so" "linux-arm64:linux-arm64:so" "darwin-x64:darwin-x86_64:dylib" "darwin-arm64:darwin-arm64:dylib"; do
            IFS=: read -r platform target ext <<< "$pair"
            src="staging/${platform}"
            [ -d "$src" ] || continue
            mkdir -p "seedfaker-php/bin/${target}"
            install -m 644 "$src/libseedfaker_ffi.${ext}" "seedfaker-php/bin/${target}/libseedfaker_ffi.${ext}" || {
              echo "::error::missing libseedfaker_ffi.${ext} for ${platform}"; exit 1;
            }
          done

          if ! find seedfaker-php/bin -name 'libseedfaker_ffi.*' -type f | grep -q .; then
            echo "::error::no FFI binaries staged for PHP package"
            exit 1
          fi
          echo "Staged PHP package files:"
          find seedfaker-php -type f -not -path '*/.git/*' | sort
      - name: Commit, tag, push
        run: |
          cd seedfaker-php
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && { echo "No changes"; exit 0; }
          VERSION="${{ needs.validate.outputs.tag }}"
          git commit -m "v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  # ---------------------------------------------------------------------------
  # Publish: Ruby (RubyGems)
  # ---------------------------------------------------------------------------

  publish-rubygems:
    name: Publish RubyGems
    needs: [build-linux, build-macos, validate]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: staging
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build and publish gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          mkdir -p packages/ruby/bin
          for pair in "linux-x64:linux-x86_64" "linux-arm64:linux-arm64" "darwin-x64:darwin-x86_64" "darwin-arm64:darwin-arm64"; do
            platform="${pair%%:*}"; target="${pair##*:}"
            src="staging/${platform}"
            [ -d "$src" ] || continue
            mkdir -p "packages/ruby/bin/${target}"
            cp "$src/libseedfaker_ffi"* "packages/ruby/bin/${target}/" 2>/dev/null || true
          done

          # RubyGems normalizes prerelease tags: 0.1.0-alpha.9 → 0.1.0.pre.alpha.9
          RUBY_VERSION_NORM=$(echo "$VERSION" | sed 's/-/.pre./')
          echo "Ruby gem version: ${RUBY_VERSION_NORM}"

          cd packages/ruby
          cat > seedfaker.gemspec <<GEMSPEC
          Gem::Specification.new do |s|
            s.name        = "seedfaker"
            s.version     = "${RUBY_VERSION_NORM}"
            s.summary     = "Deterministic synthetic data generator"
            s.description = "200+ fields, 68 locales. Same seed = same output across CLI, Python, Node.js, Go, PHP, Ruby."
            s.authors     = ["Eduard Titov"]
            s.email       = "editied@gmail.com"
            s.homepage    = "https://github.com/opendsr-std/seedfaker"
            s.license     = "MIT"
            s.files       = Dir["lib/**/*", "bin/**/*", "README.md", "LICENSE"]
            s.require_paths = ["lib"]
            s.required_ruby_version = ">= 2.7"
          end
          GEMSPEC

          cp ../../LICENSE LICENSE
          gem build seedfaker.gemspec

          # Find built gem (rubygems may further normalize the filename)
          GEM_FILE=$(ls seedfaker-*.gem | head -1)
          [ -n "$GEM_FILE" ] || { echo "::error::no .gem file produced"; exit 1; }
          echo "Pushing $GEM_FILE"
          gem push "$GEM_FILE"

  # ---------------------------------------------------------------------------
  # Publish: Homebrew
  # ---------------------------------------------------------------------------

  publish-brew:
    name: Update Homebrew tap
    needs:
      [
        publish-github,
        publish-cargo,
        publish-npm,
        publish-pypi-upload,
        publish-go,
        publish-php,
        publish-rubygems,
        validate,
      ]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Download tarballs and compute SHA256
        id: sha
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          BASE="https://github.com/opendsr-std/seedfaker/releases/download/v${VERSION}"
          mkdir -p tarballs
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            url="${BASE}/seedfaker-${platform}.tar.gz"
            echo "Downloading ${url}"
            curl -fSL -o "tarballs/seedfaker-${platform}.tar.gz" "$url"
            sha=$(sha256sum "tarballs/seedfaker-${platform}.tar.gz" | awk '{print $1}')
            key=$(echo "$platform" | tr '-' '_')
            echo "${key}=${sha}" >> $GITHUB_OUTPUT
            echo "  ${platform}: ${sha}"
          done
      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: opendsr-std/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Write formula
        run: |
          VERSION="${{ needs.validate.outputs.tag }}"
          BASE="https://github.com/opendsr-std/seedfaker/releases/download/v${VERSION}"
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/seedfaker.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Seedfaker < Formula
            desc "Deterministic synthetic data generator"
            homepage "https://github.com/opendsr-std/seedfaker"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/seedfaker-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "${BASE}/seedfaker-darwin-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/seedfaker-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "${BASE}/seedfaker-linux-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install "seedfaker"
            end

            test do
              assert_match "seedfaker", shell_output("#{bin}/seedfaker --version")
            end
          end
          EOF
          echo "Formula written:"
          cat homebrew-tap/Formula/seedfaker.rb
      - name: Validate formula syntax
        run: ruby -c homebrew-tap/Formula/seedfaker.rb
      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/seedfaker.rb
          git diff --cached --quiet && { echo "No formula changes"; exit 0; }
          git commit -m "seedfaker ${{ needs.validate.outputs.tag }}"
          git push
