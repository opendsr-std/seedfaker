  HPI: {{name}} is a {{age:18..95}}-year-old {{enum:male=48,female=48,non-binary=4}} presenting with {{message}}. Patient reports symptoms began {{integer:1..14}} days ago. PMH significant for {{enum:hypertension=20,diabetes mellitus type 2=15,asthma=10,GERD=10,depression=10,hypothyroidism=8,osteoarthritis=8,hyperlipidemia=8,COPD=5,heart failure=3,none=3}}.

