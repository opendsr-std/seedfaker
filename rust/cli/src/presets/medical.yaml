columns:
  type: enum:progress_note=15,discharge=12,lab_result=12,prescription=10,referral=8,radiology=8,insurance_claim=8,consent=6,emergency=6,mental_health=5,nursing=5,pathology=5
  name: name
  email: email
  phone: phone
  ssn: ssn
  dob: birthdate:1940..2010
  addr: address
  company: company-name
  doc: last-name

template: |
  {{#if type == "progress_note"}}
