[graph]
all-features = true

[advisories]
ignore = []

[licenses]
# Only permissive licenses compatible with MIT.
# "OR" licenses (Unlicense OR MIT) — we select the MIT side.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",  # target-lexicon (PyO3 build dep) — Apache-2.0 + patent grant relaxation
    "ISC",                              # libloading (napi transitive) — simplified BSD, MIT-compatible
    "Unicode-3.0",                      # unicode-ident (proc-macro2)
]
confidence-threshold = 0.9

[bans]
multiple-versions = "deny"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
